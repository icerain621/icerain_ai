run:
  mode: "read"
  targetUrl: "https://example.com"
  siteKey: "example.com"
  steps:
    - id: connect
      kind: connect
    - id: open
      kind: open
      with: { url: "${run.targetUrl}" }
    - id: snap
      kind: snapshot
      with: { compact: true, interactive: true, maxChars: 8000 }
    - id: extract
      kind: extract
    - id: report
      kind: report
